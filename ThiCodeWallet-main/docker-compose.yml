services:
  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb-wallet-volume:/data/db
    restart: always
    networks:
      - net-wallet

  api:
    container_name: api-wallet
    build: ./api
    restart: always
    ports:
      - "5002:5002"
    depends_on:
      - mongo
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const s=require('net').createConnection(5002,'127.0.0.1');s.on('connect',()=>{s.end();process.exit(0)});s.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),1000);",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    env_file:
      - ./api/.env
    networks:
      - net-wallet

  nginx:
    container_name: nginx-wallet
    build:
      context: .
      dockerfile: ./nginx/Dockerfile
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
    networks:
      - net-wallet

volumes:
  mongodb-wallet-volume:

networks:
  net-wallet:
    name: net-wallet
    driver: bridge
